<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1e3a5f;--primary-light:#2d5a8e;--accent:#f39c12;
  --success:#27ae60;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --bg:#f0f2f5;--card:#fff;--text:#333;--text-light:#666;--border:#e0e0e0;
  --sidebar-w:240px
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{text-decoration:none;color:inherit}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);background:var(--primary);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:.3s}
#sidebar .brand{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px}
#sidebar .brand .icon{font-size:28px}
#sidebar .brand h1{font-size:14px;line-height:1.4;font-weight:700}
#sidebar .brand p{font-size:11px;opacity:.7;margin-top:2px}
#sidebar nav{flex:1;overflow-y:auto;padding:8px 0}
#sidebar nav .section-label{font-size:10px;opacity:.5;padding:12px 16px 4px;text-transform:uppercase;letter-spacing:1px}
#sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;cursor:pointer;transition:.15s;border-left:3px solid transparent}
#sidebar nav a:hover{background:rgba(255,255,255,.1)}
#sidebar nav a.active{background:rgba(255,255,255,.15);border-left-color:var(--accent)}
#sidebar nav a .nav-icon{font-size:16px;width:20px;text-align:center}
#sidebar .sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.15);font-size:11px;opacity:.6}

/* MAIN */
#main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#topbar h2{font-size:18px;font-weight:700;color:var(--primary)}
#topbar .topbar-right{display:flex;align-items:center;gap:12px}
#topbar .badge{background:var(--danger);color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center}
#content{padding:24px;flex:1}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid transparent}
.stat-card.blue{border-left-color:var(--info)}
.stat-card.green{border-left-color:var(--success)}
.stat-card.orange{border-left-color:var(--warning)}
.stat-card.red{border-left-color:var(--danger)}
.stat-card .label{font-size:12px;color:var(--text-light);margin-bottom:6px}
.stat-card .value{font-size:24px;font-weight:700;color:var(--primary)}
.stat-card .sub{font-size:11px;color:var(--text-light);margin-top:4px}

/* TABLES */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-header h3{font-size:15px;font-weight:700;color:var(--primary)}
.card-body{padding:16px 20px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fa;padding:10px 12px;text-align:left;font-weight:600;color:var(--text-light);font-size:12px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* BADGES */
.badge-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-success{background:#e8f8f0;color:#27ae60}
.badge-warning{background:#fff8e6;color:#f39c12}
.badge-danger{background:#fdecea;color:#e74c3c}
.badge-info{background:#e8f4fd;color:#2980b9}
.badge-secondary{background:#f0f0f0;color:#666}
.badge-purple{background:#f3e8fd;color:#8e44ad}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:#fff;color:var(--primary);border:1px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:var(--text-light)}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;width:100%;outline:none;transition:.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(45,90,142,.1)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:min(700px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:700;color:var(--primary)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);padding:4px}

/* ALERTS */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.alert-warning{background:#fff8e6;border:1px solid #f39c12;color:#856404}
.alert-danger{background:#fdecea;border:1px solid #e74c3c;color:#721c24}
.alert-info{background:#e8f4fd;border:1px solid #3498db;color:#0c5460}
.alert-success{background:#e8f8f0;border:1px solid #27ae60;color:#155724}

/* PROGRESS */
.progress{background:#e9ecef;border-radius:10px;height:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:10px;transition:.3s}

/* SEARCH/FILTER BAR */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit}
.filter-bar input{flex:1;min-width:200px}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* DEPRECIATION */
.depr-bar{background:#e9ecef;border-radius:10px;height:6px;overflow:hidden;margin-top:4px}
.depr-fill{height:100%;border-radius:10px}

/* PRINT */
@media print{
  #sidebar,#topbar,.btn,.filter-bar,.card-header .btn{display:none!important}
  #main{margin-left:0}
  #content{padding:0}
  .card{box-shadow:none;border:1px solid #ddd}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

.text-right{text-align:right}
.text-center{text-align:center}
.text-muted{color:var(--text-light)}
.fw-bold{font-weight:700}
.mt-4{margin-top:16px}
.gap-8{gap:8px}

// STATE & STORAGE
// ============================================================
let state = {
  procurement: [],
  assets: [],
  supplies: [],
  vendors: [],
  contracts: [],
  auditLog: [],
  committees: []
};

function loadState(){
  try{
    const saved = localStorage.getItem('wsw_procurement_v2');
    if(saved){
      const parsed = JSON.parse(saved);
      state = {...state,...parsed};
    }
  }catch(e){}
  // Seed if empty
  if(!state.procurement.length) state.procurement = JSON.parse(JSON.stringify(PROC_SEED));
  if(!state.assets.length) state.assets = JSON.parse(JSON.stringify(ASSET_SEED));
  if(!state.supplies.length) state.supplies = JSON.parse(JSON.stringify(SUPPLY_SEED));
  if(!state.vendors.length) seedVendors();
}

function saveState(){
  localStorage.setItem('wsw_procurement_v2', JSON.stringify(state));
}

function seedVendors(){
  const vmap = {};
  state.procurement.forEach(p=>{
    if(!vmap[p.vendor]) vmap[p.vendor]={name:p.vendor,taxId:p.taxId||'',total:0,count:0};
    vmap[p.vendor].total += p.amount;
    vmap[p.vendor].count++;
  });
  state.vendors = Object.values(vmap).map((v,i)=>({...v,id:i+1,type:'',address:'',phone:'',bank:''}));
}

function addAudit(action, detail){
  state.auditLog.unshift({
    ts: new Date().toLocaleString('th-TH'),
    user: 'ครูอนุพงศ์',
    action, detail
  });
  if(state.auditLog.length>200) state.auditLog = state.auditLog.slice(0,200);
}

const pages = {
  dashboard:'แดชบอร์ด',

  contracts:'บริหารสัญญา',

  reports:'รายงานสรุป',
  audit:'Audit Trail'
};

let currentPage = 'dashboard';

function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-link').forEach(a=>{
    a.classList.toggle('active', a.getAttribute('onclick').includes(`'${page}'`));
  });
  document.getElementById('page-title').textContent = pages[page]||page;
  render(page);
  window.scrollTo(0,0);
}

function render(page){
  const c = document.getElementById('content');
  switch(page){
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'procurement': c.innerHTML = renderProcurement(); break;
    case 'contracts': c.innerHTML = renderContracts(); break;
    case 'assets': c.innerHTML = renderAssets(); break;
    case 'supplies': c.innerHTML = renderSupplies(); break;
    case 'documents': c.innerHTML = renderDocuments(); break;
    case 'vendors': c.innerHTML = renderVendors(); break;
    case 'reports': c.innerHTML = renderReports(); break;
    case 'audit': c.innerHTML = renderAudit(); break;
    default: c.innerHTML = '<p>ไม่พบหน้า</p>';
  }
}

function updateProcTable(){
  const filtered = state.procurement.filter(p=>{
    const q = procFilter.q.toLowerCase();
    const matchQ = !q || p.id.toLowerCase().includes(q)||p.vendor.toLowerCase().includes(q)||p.items.toLowerCase().includes(q);
    const matchT = !procFilter.type || p.type===procFilter.type;
    const matchS = !procFilter.status || (procFilter.status==='received'?p.receiveDate:!p.receiveDate);
    return matchQ&&matchT&&matchS;
  });
  const total = filtered.reduce((s,p)=>s+p.amount,0);
  const tbody = document.getElementById('proc-tbody');
  if(tbody) tbody.innerHTML = filtered.map(p=>procRow(p)).join('');
}

function addProc(){
  const id = document.getElementById('f-id').value.trim();
  if(!id){alert('กรุณาระบุเลขที่');return;}
  if(state.procurement.find(p=>p.id===id)){alert('เลขที่นี้มีอยู่แล้ว');return;}
  const p = {
    id, type:v('f-type'), date:v('f-date'), vendor:v('f-vendor'),

    budgetType:v('f-budtype'), receiveDate:v('f-receive'), items:v('f-items'), reqNo:''
  };
  state.procurement.push(p);
  addAudit('เพิ่มรายการ',`${id} - ${p.vendor} ${fmt(p.amount)} บาท`);
  saveState(); closeModal(); navigate('procurement');
}

  const p = state.procurement.find(x=>x.id===id);

function saveProc(id){
  const p = state.procurement.find(x=>x.id===id);
  if(!p) return;
  p.type=v('f-type'); p.date=v('f-date'); p.vendor=v('f-vendor');
  p.taxId=v('f-taxid'); p.amount=parseFloat(v('f-amount'))||0;
  p.budgetType=v('f-budtype'); p.receiveDate=v('f-receive'); p.items=v('f-items');
  addAudit('แก้ไขรายการ',`${id} - ${p.vendor}`);
  saveState(); closeModal(); navigate('procurement');
}

            const statusText=s.stock<=s.minStock?'ต่ำกว่าขั้นต่ำ':s.stock<=s.minStock*1.5?'ใกล้หมด':'ปกติ';
            return `<tr>
              <td style="font-size:12px">${s.id}</td>
              <td class="fw-bold">${s.name}</td>
              <td><span class="badge-pill badge-secondary">${s.category}</span></td>
              <td class="text-right fw-bold" style="color:${s.stock<=s.minStock?'#e74c3c':s.stock<=s.minStock*1.5?'#f39c12':'#27ae60'}">${s.stock}</td>
              <td>${s.unit}</td>
              <td class="text-right">${fmt(s.price)}</td>
              <td class="text-right">${fmt(s.stock*s.price)}</td>
              <td class="text-right text-muted">${s.minStock}</td>
              <td class="text-right text-muted">${s.maxStock}</td>
              <td><span class="badge-pill ${statusColor}">${statusText}</span></td>
              <td><button class="btn btn-xs btn-outline" onclick="editSupply('${s.id}')">แก้ไข</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function doSupplyTx(){
  const sid=v('f-sid');const txtype=v('f-txtype');const qty=parseInt(v('f-qty'))||0;const note=v('f-note');
  const s=state.supplies.find(x=>x.id===sid);
  if(!s||qty<=0) return;
  if(txtype==='เบิก'&&s.stock<qty){alert('วัสดุไม่เพียงพอ');return;}
  s.stock+=(txtype==='รับ'?qty:-qty);
  addAudit(`${txtype}วัสดุ`,`${s.name} ${qty} ${s.unit}${note?' - '+note:''}`);
  saveState();closeModal();navigate('supplies');
}

function addSupply(){
  const s={id:v('f-id'),name:v('f-name'),unit:v('f-unit'),stock:parseInt(v('f-stock'))||0,minStock:parseInt(v('f-min'))||0,maxStock:parseInt(v('f-max'))||0,price:parseFloat(v('f-price'))||0,category:v('f-cat')};
  if(!s.id||!s.name){alert('กรุณากรอกรหัสและชื่อ');return;}
  state.supplies.push(s);addAudit('เพิ่มวัสดุ',s.name);saveState();closeModal();navigate('supplies');
}

function editSupply(id){
  const s=state.supplies.find(x=>x.id===id);
  if(s) openSupplyForm(s);
}

function saveSupply(id){
  const s=state.supplies.find(x=>x.id===id);
  if(!s) return;
  s.name=v('f-name');s.unit=v('f-unit');s.stock=parseInt(v('f-stock'))||0;
  s.minStock=parseInt(v('f-min'))||0;s.maxStock=parseInt(v('f-max'))||0;
  s.price=parseFloat(v('f-price'))||0;s.category=v('f-cat');
  addAudit('แก้ไขวัสดุ',`${id} - ${s.name}`);
  saveState();closeModal();navigate('supplies');
}

// ============================================================

function fmt(n){
  if(!n&&n!==0) return '-';
  return n.toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})+' บาท';
}

function typeBadge(t){
  const cls = t==='ใบสั่งซื้อ'?'badge-info':t==='ใบสั่งจ้าง'?'badge-purple':t==='สัญญาซื้อ'?'badge-warning':'badge-danger';
  return `<span class="badge-pill ${cls}">${t}</span>`;
}

function condBadge(c){
  const cls = c==='ดี'?'badge-success':c==='พอใช้'?'badge-warning':c==='รอซ่อม'?'badge-danger':'badge-secondary';
  return `<span class="badge-pill ${cls}">${c}</span>`;
}

function todayTH(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()+543}`;
}

function v(id){return document.getElementById(id)?.value||'';}

function openModal(title,body,footer){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function exportData(){
  const data=JSON.stringify(state,null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download=`procurement_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  addAudit('Export ข้อมูล','JSON backup');
  saveState();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
